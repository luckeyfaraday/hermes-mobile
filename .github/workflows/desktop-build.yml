name: Desktop Builds

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS x64
            os: macos-13
            command: npm run dist -- --mac --x64 --publish never
            artifact: macos
            paths: |
              dist/*.dmg
              dist/*.zip
              dist/*.yml
          - name: Windows x64
            os: windows-2022
            command: npm run dist -- --win --x64 --publish never
            artifact: windows
            paths: |
              dist/*.exe
              dist/*.blockmap
              dist/*.yml

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: ${{ matrix.command }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hermes-mobile-host-${{ matrix.artifact }}-${{ github.sha }}
          path: ${{ matrix.paths }}
          if-no-files-found: error
